<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario - test</title>
</head>

<body>
    <header>
        <h1>Formulario - test</h1>
    </header>

    <section id="Contatos">

<h2>Contato pessoal</h2>

<form action="">

<label for="nome">Nome Completo: </label>
             <input type="text" id="nome" name="nome" required> <br>

             <label for="email">_______-E-mail: </label>
             <input type="email" id="email" name="email" required> <br>

             <label for="idade">________-Idade: </label>
             <input type="number" id="idade" name="idade"> <br>

</form>

    </section>

<section id="Dados Profissionais">

<h2>Dados Profissionais</h2>

<p>Para qual matéria você esta se candidatando para lecionar?</p>

<form action="">

<label for="assunto">Matérias: </label>
             <select name="assunto" id="assunto"> 
                <option value="Matemática">Matemática</option>
                <option value="Português">Português</option>
                <option value="Biologia">Biologia</option>
                <option value="Ciências">Ciências</option>
                <option value="História">História</option>
                <option value="Geografia">Geografia</option>
                <option value="Artes">Artes</option>

             </select>

</form>

<br>

<form action="">

<label for="assunto">Nível de Escolaridade: </label>
<select name="assunto" id="assunto">
<option value="Ensino superior Completo">Ensino superior Completo</option>
<option value="Cursando Mestrado">Cursando Mestrado</option>
<option value="Mestrado Completo">Mestrado Completo</option>
<option value="Cursando Doutorado">Cursando Doutorado</option>
<option value="Doutorado Completo">Doutorado Completo</option>


</select>
</form>

</section>

</body>
